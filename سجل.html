function doSearch() {
    var q = document.getElementById("search").value.trim();
    if (q === "") { 
        show(DATA); 
        return; 
    }
    var r = DATA.filter(function(p){ 
        return p["الاسم"].indexOf(q) >= 0 || p["المدفن"].indexOf(q) >= 0; 
    });
    show(r);
}

function show(list) {
    var el = document.getElementById("results");
    var ct = document.getElementById("counter");
    
    ct.textContent = "عدد النتائج: " + list.length + " من أصل " + DATA.length;
    
    if (list.length === 0) { 
        el.innerHTML = "<p>لم يُعثر على نتائج</p>"; 
        return; 
    }
    
    var html = "";
    for (var i = 0; i < list.length; i++) {
        var p = list[i];
        
        html += '<div class="بطاقة">';
        html += '<div class="اسم">' + p["الاسم"] + ' (' + p["الفرع"] + ')</div>';
        html += '<table class="جدول">';
        html += '<tr><th></th><th>هجري</th><th>ميلادي</th></tr>';
        html += '<tr><td class="تسمية">الوفاة</td><td>' + p["عام_الوفاة_هجري"] + '</td><td>' + p["عام_الوفاة_ميلادي"] + '</td></tr>';
        html += '<tr><td class="تسمية">الميلاد</td><td>' + p["عام_الميلاد_هجري"] + '</td><td>' + p["عام_الميلاد_ميلادي"] + '</td></tr>';
        html += '<tr><td class="تسمية">المدفن</td><td colspan="2">' + p["المدفن"] + '</td></tr>';
        html += '</table></div>';
    }
    el.innerHTML = html;
}

var atBottom = false;

function doScroll() {
    if (atBottom) {
        window.scrollTo({top: 0, behavior: "smooth"});
        document.getElementById("scroll-btn").textContent = "∨";
        atBottom = false;
    } else {
        window.scrollTo({top: document.body.scrollHeight, behavior: "smooth"});
        document.getElementById("scroll-btn").textContent = "∧";
        atBottom = true;
    }
}

// عرض جميع البيانات عند تحميل الصفحة
show(DATA);
