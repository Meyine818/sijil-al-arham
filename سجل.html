    function بحث() {
        const نص = document.getElementById('حقل-البحث').value.trim();
        if (نص === '') { عرض_النتائج(البيانات); return; }
        const نتائج = البيانات.filter(ش => ش['الاسم'].includes(نص) || ش['المدفن'].includes(نص));

    }
